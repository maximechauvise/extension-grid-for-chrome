<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Grid Tab — Options</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <!-- Vue liste -->
  <div id="view-list" class="view">
    <header class="page-header">
      <h1>Grid Tab</h1>
      <div class="header-actions">
        <button id="btn-import-trigger">Importer JSON</button>
        <button id="btn-export">Exporter JSON</button>
        <button id="btn-add" class="primary">+ Nouveau layout</button>
      </div>
    </header>

    <input type="file" id="import-file" accept=".json" style="display:none" />

    <div id="layouts-container">
      <p class="empty-state">Aucun layout. Commence par en créer un !</p>
    </div>
  </div>

  <!-- Vue édition -->
  <div id="view-edit" class="view hidden">
    <header class="page-header">
      <button id="btn-back">← Retour</button>
      <h2 id="edit-title">Nouveau layout</h2>
    </header>

    <form id="edit-form">
      <section class="form-section">
        <label for="input-name">Nom</label>
        <input type="text" id="input-name" placeholder="ex : Morning Setup" required />
      </section>

      <section class="form-section">
        <label>Preset</label>
        <div id="preset-selector" class="preset-selector"></div>
      </section>

      <section class="form-section">
        <label>Proportions <span class="label-hint">— glisse les séparateurs</span></label>
        <div id="proportion-editor" class="proportion-editor"></div>
      </section>

      <section class="form-section">
        <label>Cellules</label>
        <div id="cells-container"></div>
      </section>

      <div class="form-actions">
        <button type="button" id="btn-cancel">Annuler</button>
        <button type="submit" class="primary">Sauvegarder</button>
      </div>
    </form>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
